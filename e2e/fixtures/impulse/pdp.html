<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sample Product — Impulse</title>
  </head>
  <body class="template-product">
    <main>
      <div class="product-single">
        <h1 class="product-single__title">Sample Product</h1>
        <div class="product-single__price product__price">
          <span class="price">
            <span class="product-single__price--regular">$49.99</span>
          </span>
        </div>
        <form class="product-single__form product-form" action="/cart/add" method="post">
          <input type="hidden" name="id" value="67890" />
          <div class="product-form__buttons">
            <button type="submit" name="add" class="btn--add-to-cart">Add to cart</button>
          </div>
        </form>

        <div
          data-b2b-price-block
          data-product-id="12345"
          data-variant-id="67890"
          data-base-price-cents="4999"
          data-b2b-only="false"
          data-customer-is-b2b="false"
          data-app-proxy-path="apps/b2b"
          data-show-savings-badge="true"
          data-price-display="alongside"
          data-price-selector="product-price, .product__price, .price"
        ></div>
      </div>
    </main>
    <script src="../b2b-price.js" defer></script>
  </body>
</html>
