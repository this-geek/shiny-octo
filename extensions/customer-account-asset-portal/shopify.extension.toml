api_version = "2026-04"

[[extensions]]
name = "B2B Dealer Asset Portal"
handle = "b2b-asset-portal"
type = "ui_extension"

  # customer-account.page.render must be the only target on an extension
  # (Shopify validator: "The target customer-account.page.render cannot be
  # combined with any other targets"). The order-index link block is split
  # into a sibling extension (b2b-asset-portal-link) if/when we add one
  # back; merchants can also surface the page directly from the customer
  # account nav menu.
  [[extensions.targeting]]
  module = "./src/AssetPortalPage.tsx"
  target = "customer-account.page.render"

  [extensions.settings]

    [[extensions.settings.fields]]
    key = "worker_base_url"
    type = "single_line_text_field"
    name = "Worker base URL"
    description = "Origin of the B2B Companion Worker (e.g. https://b2b-companion.selling.workers.dev). The extension calls /customer-account/* on this host. Required — the portal renders an error banner if unset."
