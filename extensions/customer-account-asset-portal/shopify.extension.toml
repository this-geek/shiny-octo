api_version = "2026-04"

[[extensions]]
name = "B2B Dealer Portal Link"
handle = "b2b-portal-link"
uid = "3429a395-1796-6492-4a97-274f2b32dd4e92835071"
type = "ui_extension"

  # Single-target block — renders a "Open dealer portal" card on the
  # buyer's order index. The actual portal is served by the Worker via
  # Shopify App Proxy at <shop>/apps/<subpath>/portal (configured in
  # shopify.app.toml -> [app_proxy]). This block exists only to surface
  # the link from inside the customer account chrome; using a single
  # target avoids the validator's "customer-account.page.render cannot
  # be combined with any other targets" error that blocked the previous
  # full-page extension.
  [[extensions.targeting]]
  module = "./src/PortalLinkBlock.tsx"
  target = "customer-account.order-index.block.render"

  [extensions.settings]

    [[extensions.settings.fields]]
    key = "portal_url"
    type = "single_line_text_field"
    name = "Portal URL"
    description = "Full URL to the dealer portal on the buyer's shop, e.g. https://your-shop.myshopify.com/apps/b2b/portal. Matches the [app_proxy] config in shopify.app.toml. The block renders nothing if this is empty."

    [[extensions.settings.fields]]
    key = "heading"
    type = "single_line_text_field"
    name = "Card heading"
    description = "Heading shown above the link. Defaults to \"Dealer portal\" when empty."

    [[extensions.settings.fields]]
    key = "cta_label"
    type = "single_line_text_field"
    name = "Call-to-action label"
    description = "Link text. Defaults to \"Open dealer portal\" when empty."
