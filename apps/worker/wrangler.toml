name = "b2b-companion"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "b2b-companion"
database_id = "f707deef-4409-486d-b113-e9a6fd0d4c34"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "c6bd96203e744e5894c2a600612cb7a9"

[[kv_namespaces]]
binding = "KV_IDEMPOTENCY"
id = "a07ba7a527c845388490ee488ce4892d"

[[kv_namespaces]]
binding = "KV_HOT_CACHE"
id = "04f2ee6fc38a4bd9aaa2b7192db7cb58"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "b2b-companion-assets"

[[queues.producers]]
binding = "WEBHOOK_QUEUE"
queue = "b2b-webhook-queue"

[[queues.consumers]]
queue = "b2b-webhook-queue"
max_batch_size = 10
max_batch_timeout = 5

[vars]
APP_URL = "https://b2b-companion.your-subdomain.workers.dev"
SHOPIFY_API_VERSION = "2025-04"

# Secrets (set via: wrangler secret put SHOPIFY_API_KEY)
# SHOPIFY_API_KEY
# SHOPIFY_API_SECRET
# MASTER_KEY  (256-bit hex)
# RESEND_API_KEY
